<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetWatch × Cloudflare — Monitor de Estado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0c0f; --surface: #10141a; --surface2: #161c25;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --text: #e2e8f0; --muted: #64748b;
      --green: #22d3a0; --green-bg: rgba(34,211,160,0.08);
      --red: #f87171;   --red-bg: rgba(248,113,113,0.08);
      --yellow: #fbbf24; --yellow-bg: rgba(251,191,36,0.08);
      --blue: #60a5fa;  --blue-bg: rgba(96,165,250,0.08);
      --accent: #f38020;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* ── HEADER ── */
    .hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-box { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-box svg { width: 18px; height: 18px; }
    .logo-name { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
    .logo-name span { color: var(--accent); font-size: 12px; font-weight: 400; margin-left: 4px; }
    .logo-sub { font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
    .hdr-r { display: flex; align-items: center; gap: 14px; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--green); background: var(--green-bg); border: 1px solid rgba(34,211,160,0.2); padding: 5px 12px; border-radius: 20px; }
    .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .upd { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }
    .rbtn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all .15s; }
    .rbtn:hover { border-color: var(--border2); color: var(--text); }

    /* ── PROXY NOTICE ── */
    .proxy-notice { margin: 14px 28px 0; padding: 10px 14px; background: rgba(243,128,32,0.06); border: 1px solid rgba(243,128,32,0.2); border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
    .proxy-notice.hidden { display: none; }
    .proxy-notice input { background: var(--surface2); border: 1px solid rgba(243,128,32,0.3); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 4px 8px; border-radius: 4px; outline: none; flex: 1; max-width: 340px; }
    .proxy-notice input::placeholder { color: var(--muted); }
    .proxy-set-btn { background: var(--accent); border: none; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 4px 10px; border-radius: 4px; cursor: pointer; white-space: nowrap; }

    /* ── SUMMARY ── */
    .summary { padding: 20px 28px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .scard { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; position: relative; overflow: hidden; }
    .scard::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; }
    .scard.ok::before { background: var(--green); } .scard.warn::before { background: var(--yellow); }
    .scard.err::before { background: var(--red); }  .scard.cf::before  { background: var(--accent); }
    .slabel { font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 8px; }
    .sval { font-size: 26px; font-weight: 800; }
    .scard.ok .sval { color: var(--green); } .scard.warn .sval { color: var(--yellow); }
    .scard.err .sval { color: var(--red); }  .scard.cf .sval  { color: var(--accent); }
    .sdesc { font-size: 10px; color: var(--muted); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }

    /* ── OVERALL ── */
    .overall { margin: 0 28px 16px; padding: 14px 18px; border-radius: 10px; display: flex; align-items: center; gap: 14px; }
    .overall.none     { background: rgba(34,211,160,0.06); border: 1px solid rgba(34,211,160,0.2); }
    .overall.minor    { background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.2); }
    .overall.major    { background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.2); }
    .overall.critical { background: rgba(248,113,113,0.09); border: 1px solid rgba(248,113,113,0.4); }
    .overall-icon { font-size: 20px; flex-shrink: 0; }
    .overall-title { font-size: 14px; font-weight: 700; }
    .overall.none .overall-title { color: var(--green); } .overall.minor .overall-title { color: var(--yellow); }
    .overall.major .overall-title, .overall.critical .overall-title { color: var(--red); }
    .overall-sub { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }
    .cf-link { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); border: 1px solid rgba(243,128,32,0.3); padding: 6px 12px; border-radius: 6px; white-space: nowrap; transition: border-color .15s; }
    .cf-link:hover { border-color: var(--accent); }

    /* ── INCIDENTS ── */
    .inc-wrap { margin: 0 28px 16px; background: var(--red-bg); border: 1px solid rgba(248,113,113,0.2); border-radius: 10px; padding: 16px 18px; }
    .inc-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .inc-title { font-size: 13px; font-weight: 700; color: var(--red); }
    .inc-tag { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: var(--red); background: rgba(248,113,113,0.12); padding: 2px 8px; border-radius: 3px; }
    .inc-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .inc-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .inc-name { font-size: 12px; font-weight: 700; color: var(--red); margin-bottom: 4px; }
    .inc-status { display: inline-block; font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 3px; background: rgba(251,191,36,0.12); color: var(--yellow); margin-right: 6px; }
    .inc-body { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; line-height: 1.6; }

    /* ── MAINTENANCE ── */
    .maint-wrap { margin: 0 28px 16px; background: var(--blue-bg); border: 1px solid rgba(96,165,250,0.2); border-radius: 10px; padding: 14px 18px; }
    .maint-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .maint-title { font-size: 12px; font-weight: 700; color: var(--blue); }
    .maint-item { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; padding: 3px 0; line-height: 1.5; }

    /* ── FILTER BAR ── */
    .fbar { padding: 0 28px 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .flabel { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-right: 4px; }
    .fbtn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all .15s; }
    .fbtn:hover { border-color: var(--border2); color: var(--text); }
    .fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .srch { position: relative; margin-left: auto; }
    .sinput { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 6px 12px 6px 28px; border-radius: 6px; outline: none; width: 200px; transition: border-color .15s; }
    .sinput:focus { border-color: var(--border2); }
    .sinput::placeholder { color: var(--muted); }
    .sicon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; }

    /* ── COMPONENTS ── */
    .cwrap { padding: 0 28px 32px; }
    .cat-title { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; text-transform: uppercase; margin: 20px 0 10px; display: flex; align-items: center; gap: 10px; }
    .cat-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .cgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
    .ccard { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; transition: border-color .15s, background .15s; }
    .ccard:hover { border-color: var(--border2); background: var(--surface2); }
    .ccard.s-operational         { border-left: 3px solid var(--green); }
    .ccard.s-degraded_performance,
    .ccard.s-partial_outage      { border-left: 3px solid var(--yellow); }
    .ccard.s-major_outage        { border-left: 3px solid var(--red); }
    .ccard.s-under_maintenance   { border-left: 3px solid var(--blue); }
    .ccard-h { display: flex; align-items: center; justify-content: space-between; }
    .cname { font-size: 13px; font-weight: 600; }
    .cbadge { display: flex; align-items: center; gap: 5px; font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 3px 9px; border-radius: 4px; }
    .cbadge.operational          { color: var(--green);  background: var(--green-bg); }
    .cbadge.degraded_performance,
    .cbadge.partial_outage       { color: var(--yellow); background: var(--yellow-bg); }
    .cbadge.major_outage         { color: var(--red);    background: var(--red-bg); }
    .cbadge.under_maintenance    { color: var(--blue);   background: var(--blue-bg); }
    .cdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .cdot.operational         { background: var(--green);  animation: pulse 2s infinite; }
    .cdot.degraded_performance,
    .cdot.partial_outage      { background: var(--yellow); animation: pulse 1.5s infinite; }
    .cdot.major_outage        { background: var(--red); }
    .cdot.under_maintenance   { background: var(--blue); }
    .cupdated { font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 5px; }

    /* ── LOADING / ERROR ── */
    .loading { text-align: center; padding: 80px 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); }
    .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-box { margin: 28px; background: var(--red-bg); border: 1px solid rgba(248,113,113,0.2); border-radius: 12px; padding: 24px; }
    .err-title { font-size: 14px; color: var(--red); font-weight: 700; margin-bottom: 12px; }
    .err-steps { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; line-height: 2; }
    .err-steps a { color: var(--accent); }
    .err-steps code { background: var(--surface2); padding: 2px 6px; border-radius: 3px; font-size: 11px; }
    .no-res { text-align: center; padding: 40px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .spin { animation: spin .8s linear infinite; display: inline-block; }

    /* ── FOOTER ── */
    .footer { border-top: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }
    .footer a { color: var(--accent); }

    @media (max-width: 700px) {
      .hdr, .summary, .overall, .inc-wrap, .maint-wrap, .fbar, .cwrap, .footer { padding-left: 16px; padding-right: 16px; }
      .overall, .inc-wrap, .maint-wrap { margin-left: 16px; margin-right: 16px; }
      .summary { grid-template-columns: repeat(2, 1fr); }
      .cgrid { grid-template-columns: 1fr; }
      .srch { display: none; }
      .footer { flex-direction: column; gap: 6px; text-align: center; }
      .proxy-notice { margin-left: 16px; margin-right: 16px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header class="hdr">
  <div class="logo">
    <div class="logo-box">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.5 12.5c.9-1.4 1.5-3 1.5-4.5C15 5.4 12.8 3 10 3S5 5.4 5 8c0 1.5.6 3.1 1.5 4.5l-1 2h9l-1-2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M7.5 14.5h5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="10" cy="8" r="1.5" fill="white"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">NetWatch <span>× Cloudflare</span></div>
      <div class="logo-sub">ESTADO EN TIEMPO REAL · API OFICIAL</div>
    </div>
  </div>
  <div class="hdr-r">
    <span class="upd" id="upd-time">Cargando...</span>
    <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
    <button class="rbtn" onclick="loadAll()">↻ Actualizar</button>
  </div>
</header>

<!-- Barra de configuración de proxy (oculta por defecto si ya hay una URL guardada) -->

<div id="main-content">
  <div class="loading">
    <div class="loading-spinner"></div>
    Conectando a Cloudflare Status API...
  </div>
</div>

<footer class="footer">
  <span>NetWatch — Datos de <a href="https://www.cloudflarestatus.com/api" target="_blank">cloudflarestatus.com/api</a></span>
  <span>Auto-actualización cada 2 min · <span style="cursor:pointer;color:var(--accent)" onclick="showProxyBar()">⚙ Configurar Worker</span></span>
</footer>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────
  // Si ya tienes tu Worker URL, ponla aquí directamente:
  const WORKER_URL = 'https://summer-fire-a5cb.ethan-barboza10.workers.dev/';
  // De lo contrario, se puede configurar con el campo en pantalla.

  const DIRECT_BASE = 'https://www.cloudflarestatus.com/api/v2';

  let allComponents = [];
  let currentFilter = 'all';

  // Ocultar barra si ya hay proxy guardado
  if (localStorage.getItem('netwatch_proxy')) {
    hideProxyBar();
  }

  const statusLabels = {
    operational:          'Operativo',
    degraded_performance: 'Degradado',
    partial_outage:       'Interrupción parcial',
    major_outage:         'Caída mayor',
    under_maintenance:    'Mantenimiento',
  };
  const indicatorIcons = { none: '✓', minor: '▲', major: '▲', critical: '●' };

  async function fetchJSON(path) {
    const base = getBase() || DIRECT_BASE;
    const res  = await fetch(base + path);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  async function loadAll() {
    const btn = document.querySelector('.rbtn');
    if (btn) btn.innerHTML = '<span class="spin">↻</span> Actualizando';
    document.getElementById('upd-time').textContent = 'Actualizando...';

    try {
      const [summary, incidents, maint] = await Promise.all([
        fetchJSON('/summary.json'),
        fetchJSON('/incidents/unresolved.json'),
        fetchJSON('/scheduled-maintenances/upcoming.json'),
      ]);
      allComponents = summary.components.filter(c => !c.group);
      renderAll(summary, incidents, maint);
      document.getElementById('upd-time').textContent =
        'Actualizado: ' + new Date().toLocaleTimeString('es-CR', { hour12: false });
    } catch (e) {
      showError(e.message);
    }

    if (btn) btn.innerHTML = '↻ Actualizar';
  }

  function showError(msg) {
    document.getElementById('main-content').innerHTML = `
      <div class="err-box">
        <div class="err-title">No se pudo obtener datos de la API (${msg})</div>
        <div class="err-steps">
          Esto se debe al bloqueo CORS del navegador. Soluciones:<br><br>
          <strong>Opción A — Worker Gratis (recomendado)</strong><br>
          1. Abre <a href="https://workers.cloudflare.com" target="_blank">workers.cloudflare.com</a> → cuenta gratis<br>
          2. Crea un nuevo Worker → pega el código del archivo <code>worker.js</code><br>
          3. Despliega y copia la URL (ej: <code>https://netwatch.tuusuario.workers.dev</code>)<br>
          4. Pégala en el campo <span style="color:var(--accent);cursor:pointer" onclick="showProxyBar()">⚙ Configurar Worker</span> abajo<br><br>
          <strong>Opción B — Ver estado directamente</strong><br>
          → <a href="https://www.cloudflarestatus.com" target="_blank">cloudflarestatus.com</a>
        </div>
      </div>`;
  }

  function renderAll(summary, incidents, maint) {
    const ind   = summary.status.indicator;
    const desc  = summary.status.description;
    const comps = summary.components.filter(c => !c.group);
    const countOp   = comps.filter(c => c.status === 'operational').length;
    const countDeg  = comps.filter(c => ['degraded_performance','partial_outage'].includes(c.status)).length;
    const countDown = comps.filter(c => c.status === 'major_outage').length;

    let html = `
      <div class="summary">
        <div class="scard ok"><div class="slabel">Operativos</div><div class="sval">${countOp}</div></div>
        <div class="scard warn"><div class="slabel">Degradados</div><div class="sval">${countDeg}</div></div>
        <div class="scard err"><div class="slabel">Caídos</div><div class="sval">${countDown}</div></div>
        <div class="scard cf"><div class="slabel">Monitoreados</div><div class="sval">${comps.length}</div><div class="sdesc">cloudflarestatus.com</div></div>
      </div>
      <div class="overall ${ind}">
        <span class="overall-icon">${indicatorIcons[ind] || '●'}</span>
        <div>
          <div class="overall-title">${desc}</div>
          <div class="overall-sub">cloudflarestatus.com · Indicador: ${ind.toUpperCase()}</div>
        </div>
        <a class="cf-link" href="https://www.cloudflarestatus.com" target="_blank">Ver oficial ↗</a>
      </div>`;

    if (incidents.incidents?.length > 0) {
      html += `<div class="inc-wrap"><div class="inc-hdr"><div class="live-dot" style="background:var(--red)"></div><div class="inc-title">Incidentes activos</div><div class="inc-tag">${incidents.incidents.length} ACTIVO${incidents.incidents.length > 1 ? 'S' : ''}</div></div>`;
      incidents.incidents.forEach(inc => {
        const last = inc.incident_updates?.[0];
        html += `<div class="inc-item"><div class="inc-name">${inc.name}</div>${last ? `<div class="inc-body"><span class="inc-status">${inc.status.toUpperCase()}</span>${last.body.slice(0,280)}${last.body.length>280?'...':''}</div>` : ''}</div>`;
      });
      html += `</div>`;
    }

    if (maint.scheduled_maintenances?.length > 0) {
      html += `<div class="maint-wrap"><div class="maint-hdr"><div class="cdot under_maintenance"></div><div class="maint-title">Mantenimientos programados (${maint.scheduled_maintenances.length})</div></div>`;
      maint.scheduled_maintenances.slice(0,5).forEach(m => {
        const d = m.scheduled_for ? new Date(m.scheduled_for).toLocaleDateString('es-CR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'TBD';
        html += `<div class="maint-item">▸ ${m.name} · ${d}</div>`;
      });
      html += `</div>`;
    }

    html += `
      <div class="fbar">
        <span class="flabel">Filtrar:</span>
        <button class="fbtn active" onclick="setFilter('all',this)">Todos</button>
        <button class="fbtn" onclick="setFilter('major_outage',this)">Caídos</button>
        <button class="fbtn" onclick="setFilter('degraded',this)">Degradados</button>
        <button class="fbtn" onclick="setFilter('operational',this)">Operativos</button>
        <button class="fbtn" onclick="setFilter('under_maintenance',this)">Mantenimiento</button>
        <div class="srch"><span class="sicon">⌕</span><input class="sinput" id="search-box" type="text" placeholder="Buscar componente..." oninput="renderComponents()"></div>
      </div>
      <div class="cwrap" id="comp-wrap"></div>`;

    document.getElementById('main-content').innerHTML = html;
    allComponents = comps;
    renderComponents();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderComponents();
  }

  function renderComponents() {
    const q    = (document.getElementById('search-box')?.value || '').toLowerCase();
    const wrap = document.getElementById('comp-wrap');
    if (!wrap) return;

    const filtered = allComponents.filter(c => {
      const matchF = currentFilter === 'all' || c.status === currentFilter
        || (currentFilter === 'degraded' && ['degraded_performance','partial_outage'].includes(c.status));
      return matchF && c.name.toLowerCase().includes(q);
    });

    if (!filtered.length) { wrap.innerHTML = '<div class="no-res">No se encontraron componentes</div>'; return; }

    const groups = {};
    filtered.forEach(c => {
      const key = c.group_id ? (allComponents.find(x => x.id === c.group_id)?.name || 'Otros') : 'General';
      (groups[key] = groups[key] || []).push(c);
    });

    wrap.innerHTML = Object.entries(groups).map(([cat, items]) => `
      <div class="cat-title">${cat}</div>
      <div class="cgrid">
        ${items.map(c => `
          <div class="ccard s-${c.status}">
            <div class="ccard-h">
              <div class="cname">${c.name}</div>
              <div class="cbadge ${c.status}"><div class="cdot ${c.status}"></div>${statusLabels[c.status] || c.status}</div>
            </div>
            <div class="cupdated">Actualizado: ${new Date(c.updated_at).toLocaleString('es-CR',{hour12:false,hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'})}</div>
          </div>`).join('')}
      </div>`).join('');
  }

  loadAll();
  setInterval(loadAll, 120000);
</script>
</body>
</html>
